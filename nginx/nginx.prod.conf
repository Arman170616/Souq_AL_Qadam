worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;
    client_max_body_size 50M;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
    gzip_min_length 1000;

    resolver 127.0.0.11 valid=30s ipv6=off;

    # ── Rate limiting zones ───────────────────────────────────────────────
    # auth: strict — 5 req/min per IP (login/register brute-force protection)
    limit_req_zone $binary_remote_addr zone=auth:10m    rate=5r/m;
    # api: general API — 100 req/min per IP
    limit_req_zone $binary_remote_addr zone=api:20m     rate=100r/m;
    # static: generous — 200 req/min per IP
    limit_req_zone $binary_remote_addr zone=static:10m  rate=200r/m;

    limit_req_status 429;
    limit_conn_status 429;

    # ── HTTP → HTTPS redirect (all domains + subdomains) ─────────────────
    server {
        listen 80;
        server_name
            bdshoe.com www.bdshoe.com
            export.bdshoe.com
            leather.bdshoe.com
            nonleather.bdshoe.com
            ladies.bdshoe.com
            baby.bdshoe.com
            leathergift.bdshoe.com
            sharif.bdshoe.com
            luxury.bdshoe.com
            66.154.113.120;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://bdshoe.com$request_uri;
        }
    }

    # ── Subdomains → proxy to frontend with X-Original-Host (unique SEO) ────────
    server {
        listen 443 ssl;
        server_name
            www.bdshoe.com
            export.bdshoe.com
            leather.bdshoe.com
            nonleather.bdshoe.com
            ladies.bdshoe.com
            baby.bdshoe.com
            leathergift.bdshoe.com
            sharif.bdshoe.com
            luxury.bdshoe.com;

        ssl_certificate     /etc/letsencrypt/live/bdshoe.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/bdshoe.com/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # Pass subdomain to Next.js middleware via X-Original-Host header
        # so generateMetadata() can return subdomain-specific title/description
        location / {
            set $frontend_upstream http://frontend:3000;
            proxy_pass $frontend_upstream;
            proxy_set_header Host bdshoe.com;
            proxy_set_header X-Original-Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }

    # ── Main HTTPS server ─────────────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name bdshoe.com;

        ssl_certificate     /etc/letsencrypt/live/bdshoe.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/bdshoe.com/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options SAMEORIGIN always;
        add_header X-Content-Type-Options nosniff always;

        # Django static files
        location /static/ {
            alias /app/staticfiles/;
            expires 30d;
            add_header Cache-Control "public, immutable";
            limit_req zone=static burst=50 nodelay;
        }

        # Django media files
        location /media/ {
            alias /app/media/;
            expires 7d;
            limit_req zone=static burst=50 nodelay;
        }

        # Auth endpoints — strict rate limit (brute-force protection)
        location ~ ^/api/v1/auth/(login|register)/ {
            limit_req zone=auth burst=3 nodelay;
            set $backend_upstream http://backend:8000;
            proxy_pass $backend_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_read_timeout 30s;
        }

        # Django REST API
        location /api/ {
            limit_req zone=api burst=30 nodelay;
            set $backend_upstream http://backend:8000;
            proxy_pass $backend_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_read_timeout 120s;
        }

        # Django admin
        location /django-admin/ {
            limit_req zone=auth burst=5 nodelay;
            set $backend_upstream http://backend:8000;
            proxy_pass $backend_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        # DRF schema / docs
        location /api-schema/ {
            set $backend_upstream http://backend:8000;
            proxy_pass $backend_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Next.js frontend
        location / {
            set $frontend_upstream http://frontend:3000;
            proxy_pass $frontend_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
