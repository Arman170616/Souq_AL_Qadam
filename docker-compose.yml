version: '3.9'

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-bdshoe_db}
      POSTGRES_USER: ${DB_USER:-bdshoe_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-bdshoe_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    mem_limit: 256m
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-bdshoe_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    mem_limit: 128m
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.development
    volumes:
      - ./backend:/app
      - media_data:/app/media
    ports:
      - "8000:8000"
    mem_limit: 512m
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"

  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.development
    volumes:
      - ./backend:/app
    mem_limit: 256m
    depends_on:
      - backend
      - redis
    command: celery -A config.celery worker --loglevel=info

  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.development
    volumes:
      - ./backend:/app
    mem_limit: 128m
    depends_on:
      - celery
    command: celery -A config.celery beat --loglevel=info

volumes:
  postgres_data:
  redis_data:
  media_data:
