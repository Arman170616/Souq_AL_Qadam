name: bdshoe_app
description: "BDShoe - Multi-Vendor E-Commerce App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^15.1.2

  # HTTP & API
  dio: ^5.8.0+1
  retrofit: ^4.4.1

  # Local storage
  flutter_secure_storage: ^9.2.4
  shared_preferences: ^2.5.3
  hive_flutter: ^1.1.0

  # UI components
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  carousel_slider: ^5.0.0
  flutter_rating_bar: ^4.0.1
  badges: ^3.1.2
  lottie: ^3.3.1

  # Forms & validation
  reactive_forms: ^18.1.0

  # Utils
  intl: ^0.20.2
  url_launcher: ^6.3.1
  image_picker: ^1.1.2
  permission_handler: ^11.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.15
  riverpod_generator: ^2.6.5
  retrofit_generator: ^9.2.3
  json_serializable: ^6.9.5

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
    - assets/icons/
